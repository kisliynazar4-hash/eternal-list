<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal List</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#111;
color:white;
}

header{
padding:20px;
background:#1a1a1a;
border-bottom:2px solid #d62d2d;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#ff4040;
font-weight:800;
font-size:24px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
cursor:pointer;
}

nav a:hover{color:#ff4040}

section{padding:20px}

.card{
background:#1c1c1c;
padding:12px;
margin:8px 0;
border-left:5px solid #d62d2d;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#d62d2d;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

button:hover{background:#ff4040}

.hidden{display:none}
</style>
</head>

<body>

<header>
<div class="logo">Eternal List</div>

<nav>
<a onclick="showPage('levels')">Levels</a>
<a onclick="showPage('players')">Players</a>
<a onclick="login()">Login</a>
</nav>
</header>

<!-- LEVELS -->
<section id="levelsPage">
<h2>📊 Top Levels</h2>
<div id="levelsList"></div>
<button onclick="addLevel()">+ Add Level</button>
</section>

<!-- PLAYERS -->
<section id="playersPage" class="hidden">
<h2>🏆 Top Players</h2>
<div id="playersList"></div>
<button onclick="addPlayer()">+ Add Player</button>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE CONFIG (заміни на свій) */
const firebaseConfig = {
apiKey: "AIzaSyDqe1P5mNBswq0gnuLScHyRn1iD27T2y4c",
authDomain: "eternal-list-28bef.firebaseapp.com",
projectId: "eternal-list-28bef",
appId: "1:999099656760:web:367da0352ae8b9db8494cd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 👑 ADMIN */
const ADMIN_EMAIL = "kisliynazar4@gmail.com";
window.isAdmin = false;

/* 💾 DEFAULT (твій старий список) */
let localLevels = [
"Thinking Space V",
"Megatrone",
"Miiopk009 Ship Trials (Buffed)",
"Silent Thinking Space 2",
"Silent Unleashed Kyouki",
"Ashley Wave Trials (Buffed, Balanced)",
"Sakupen End (Megabuffed, Possible, Balanced)",
"Death Corridor (Buffed, Possible)",
"Zoink game trials",
"Top 10"
];

let localPlayers = [
"Miiopk009",
"Zoink",
"Doggie",
"Vortrox",
"SikuLLL",
"Gamer999",
"Trick",
"Arshadow",
"GalaxySamok",
"Riot"
];

/* 🌍 LIVE DATA */
let levels = [];
let players = [];

/* 🔐 LOGIN */
window.login = async function(){
const email = prompt("Email:");
const pass = prompt("Password:");

const user = await signInWithEmailAndPassword(auth,email,pass);

if(user.user.email === ADMIN_EMAIL){
window.isAdmin = true;
alert("ADMIN LOGGED IN");
} else {
alert("USER LOGGED IN");
}
};

/* 📊 LOAD LEVELS */
async function loadLevels(){
const snap = await getDocs(collection(db,"levels"));
levels = [];

snap.forEach(d=>{
levels.push({id:d.id,...d.data()});
});

if(levels.length === 0){
levels = localLevels.map((n,i)=>({id:i,name:n}));
}

renderLevels();
}

/* 👤 LOAD PLAYERS */
async function loadPlayers(){
const snap = await getDocs(collection(db,"players"));
players = [];

snap.forEach(d=>{
players.push({id:d.id,...d.data()});
});

if(players.length === 0){
players = localPlayers.map((n,i)=>({id:i,name:n}));
}

renderPlayers();
}

/* ➕ ADD LEVEL */
window.addLevel = async function(){
if(!window.isAdmin) return alert("NOT ADMIN");

let name = prompt("Level name:");
if(!name) return;

await addDoc(collection(db,"levels"),{name});

loadLevels();
};

/* ➕ ADD PLAYER */
window.addPlayer = async function(){
if(!window.isAdmin) return alert("NOT ADMIN");

let name = prompt("Player name:");
if(!name) return;

await addDoc(collection(db,"players"),{name});

loadPlayers();
};

/* ❌ DELETE */
window.deleteLevel = async function(id){
if(!window.isAdmin) return;
await deleteDoc(doc(db,"levels",id));
loadLevels();
};

window.deletePlayer = async function(id){
if(!window.isAdmin) return;
await deleteDoc(doc(db,"players",id));
loadPlayers();
};

/* 🖥 RENDER LEVELS */
function renderLevels(){
const list = document.getElementById("levelsList");
list.innerHTML="";

levels.forEach((l,i)=>{
list.innerHTML += `
<div class="card">
<div>#${i+1} ${l.name}</div>
${window.isAdmin ? `<button onclick="deleteLevel('${l.id}')">X</button>` : ""}
</div>`;
});
}

/* 🖥 RENDER PLAYERS */
function renderPlayers(){
const list = document.getElementById("playersList");
list.innerHTML="";

players.forEach((p,i)=>{
list.innerHTML += `
<div class="card">
<div>#${i+1} ${p.name}</div>
${window.isAdmin ? `<button onclick="deletePlayer('${p.id}')">X</button>` : ""}
</div>`;
});
}

/* 🔄 MENU */
window.showPage = function(page){
document.getElementById("levelsPage").classList.add("hidden");
document.getElementById("playersPage").classList.add("hidden");

if(page==="levels") document.getElementById("levelsPage").classList.remove("hidden");
if(page==="players") document.getElementById("playersPage").classList.remove("hidden");
};

/* 🚀 INIT */
loadLevels();
loadPlayers();

</script>

</body>
</html>
