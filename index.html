<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal List</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#111;
color:white;
}

header{
padding:20px;
background:#1a1a1a;
border-bottom:2px solid #d62d2d;
display:flex;
justify-content:space-between;
}

.logo{color:#ff4040;font-weight:800;font-size:24px}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

section{padding:20px}

.card{
background:#1c1c1c;
padding:15px;
margin:10px 0;
border-left:5px solid #d62d2d;
}

h2{color:#ff4040}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:800px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="logo">Eternal List</div>
<nav>
<a href="#levels">Levels</a>
<a href="#players">Players</a>
</nav>
</header>

<section>
<h2>🔥 Main Dashboard</h2>
<p>Welcome to Eternal List - Geometry Dash Demonlist</p>
</section>

<div class="grid">

<!-- LEVELS -->
<section id="levels">
<h2>📊 Top 100 Levels</h2>
<div id="levelsList"></div>
</section>

<!-- PLAYERS -->
<section id="players">
<h2>🏆 Top 10 Players</h2>
<div id="playersList"></div>
</section>

</div>

<script>

// 🏆 TOP 10 PLAYERS
const players = [
"Zoink",
"Trick",
"NiKo",
"Sillow",
"Swiborg",
"SpaceUK",
"Solar",
"Juhou",
"Blitzer",
"Technical"
];

// 📊 TOP 100 LEVELS (auto generated)
const levels = [
"Acheron",
"Tidal Wave",
"Avernus",
"Silent Clubstep",
"Kyouki"
];

// generate fake remaining levels
for(let i=6;i<=100;i++){
levels.push("Level " + i);
}

// render players
const playersList = document.getElementById("playersList");

players.forEach((p,i)=>{
playersList.innerHTML += `
<div class="card">
#${i+1} ${p}
</div>`;
});

// render levels
const levelsList = document.getElementById("levelsList");

levels.forEach((l,i)=>{
levelsList.innerHTML += `
<div class="card">
#${i+1} ${l}
</div>`;
});

</script>

</body>
</html>
