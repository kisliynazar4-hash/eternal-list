<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal List</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:18px;
background:#1a1a1a;
border-bottom:2px solid #ff3b3b;
}

.logo{
font-weight:800;
color:#ff3b3b;
font-size:22px;
}

nav a{
margin:0 10px;
cursor:pointer;
color:white;
text-decoration:none;
}

nav a:hover{color:#ff3b3b}

.container{padding:20px}

.card{
background:#1c1c1c;
padding:12px;
margin:8px 0;
border-left:5px solid #ff3b3b;
display:flex;
justify-content:space-between;
}

button{
background:#ff3b3b;
border:none;
color:white;
padding:5px 10px;
cursor:pointer;
}

button:hover{background:#ff6666}

input{
padding:6px;
margin:5px;
}

.section-title{
color:#ff3b3b;
font-size:20px;
margin-bottom:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<header>
<div class="logo">Eternal List</div>

<nav>
<a onclick="show('levels')">Levels</a>
<a onclick="show('players')">Players</a>
<a onclick="showTop10()">Top 10</a>
</nav>
</header>

<div class="container">

<!-- LEVELS -->
<section id="levelsPage">
<div class="section-title">🏆 TOP 100 LEVELS</div>

<input id="levelSearch" placeholder="Search levels..." oninput="renderLevels()">

<br>

<input id="levelName" placeholder="Level name">
<button onclick="addLevel()">Add</button>

<div id="levelsList"></div>
</section>

<!-- PLAYERS -->
<section id="playersPage" class="hidden">
<div class="section-title">👤 PLAYERS</div>

<input id="playerName" placeholder="Player name">
<button onclick="addPlayer()">Add</button>

<div id="playersList"></div>
</section>

<!-- TOP 10 -->
<section id="top10Page" class="hidden">
<div class="section-title">📊 TOP 10 PLAYERS</div>
<div id="top10List"></div>
</section>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyDqe1P5mNBswq0gnuLScHyRn1iD27T2y4c",
authDomain:"eternal-list-28bef.firebaseapp.com",
projectId:"eternal-list-28bef",
appId:"1:999099656760:web:367da0352ae8b9db8494cd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 👑 ADMIN */
const ADMIN_EMAIL = "admin@gmail.com";
window.isAdmin=false;

/* 💾 YOUR ORIGINAL DATA (SAFE FALLBACK) */
let defaultLevels = [
"Thinking Space V",
"Megatrone",
"Miiopk009 Ship Trials (Buffed)",
"Silent Thinking Space 2",
"Silent Unleashed Kyouki",
"Ashley Wave Trials (Buffed, Balanced)",
"Sakupen End (Megabuffed, Possible, Balanced)",
"Death Corridor (Buffed, Possible)",
"Zoink game trials",
"Top 10"
];

let defaultPlayers = [
"Miiopk009",
"Zoink",
"Doggie",
"Vortrox",
"SikuLLL",
"Gamer999",
"Trick",
"Arshadow",
"GalaxySamok",
"Riot"
];

/* 🌍 LIVE DATA */
let levels=[];
let players=[];

/* 🧠 POINTERCRATE STYLE */
function calcPoints(pos){
return Math.max(0,1000 - pos*8);
}

/* 🔐 LOGIN */
window.login = async function(){
const email=prompt("email");
const pass=prompt("password");

const user=await signInWithEmailAndPassword(auth,email,pass);

if(email===ADMIN_EMAIL){
window.isAdmin=true;
alert("ADMIN LOGGED IN");
}
}

/* 📊 LOAD LEVELS */
async function loadLevels(){
levels=[];
const snap=await getDocs(collection(db,"levels"));

snap.forEach(d=>{
levels.push({id:d.id,...d.data()});
});

/* 🔥 fallback if empty */
if(levels.length===0){
levels = defaultLevels.map((n,i)=>({
id:i,
name:n,
position:i+1,
points:calcPoints(i+1)
}));
}

renderLevels();
}

/* 👤 LOAD PLAYERS */
async function loadPlayers(){
players=[];
const snap=await getDocs(collection(db,"users"));

snap.forEach(d=>{
players.push({id:d.id,...d.data()});
});

/* 🔥 fallback */
if(players.length===0){
players = defaultPlayers.map((n,i)=>({
id:i,
name:n,
points:1000-i*50
}));
}

renderPlayers();
renderTop10();
}

/* ➕ LEVEL */
window.addLevel = async function(){
if(!window.isAdmin) return alert("NOT ADMIN");

let name=document.getElementById("levelName").value;
if(!name) return;

await addDoc(collection(db,"levels"),{
name,
position:levels.length+1,
points:calcPoints(levels.length+1)
});

loadLevels();
}

/* ➕ PLAYER */
window.addPlayer = async function(){
if(!window.isAdmin) return alert("NOT ADMIN");

let name=document.getElementById("playerName").value;
if(!name) return;

await addDoc(collection(db,"users"),{
name,
points:0
});

loadPlayers();
}

/* ❌ DELETE */
window.deleteLevel=async function(id){
if(!window.isAdmin) return;
await deleteDoc(doc(db,"levels",id));
loadLevels();
}

/* 🔍 SEARCH */
function filtered(){
let q=document.getElementById("levelSearch")?.value||"";
return levels.filter(l=>l.name.toLowerCase().includes(q.toLowerCase()));
}

/* 🖥 LEVELS */
window.renderLevels=function(){
const el=document.getElementById("levelsList");
el.innerHTML="";

filtered().forEach((l,i)=>{
el.innerHTML+=`
<div class="card">
<div>#${i+1} ${l.name}</div>
${window.isAdmin?`<button onclick="deleteLevel('${l.id}')">X</button>`:""}
</div>`;
});
}

/* 🖥 PLAYERS */
window.renderPlayers=function(){
const el=document.getElementById("playersList");
el.innerHTML="";

players.forEach((p,i)=>{
el.innerHTML+=`
<div class="card">
<div>${p.name} (${p.points||0})</div>
</div>`;
});
}

/* 🏆 TOP 10 */
window.renderTop10=function(){
const el=document.getElementById("top10List");

let top=[...players].sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,10);

el.innerHTML="";

top.forEach((p,i)=>{
el.innerHTML+=`
<div class="card">#${i+1} ${p.name} - ${p.points||0}</div>
`;
});
}

/* NAV */
window.show=function(page){
levelsPage.style.display=page==="levels"?"block":"none";
playersPage.style.display=page==="players"?"block":"none";
top10Page.style.display="none";
}

window.showTop10=function(){
levelsPage.style.display="none";
playersPage.style.display="none";
top10Page.style.display="block";
renderTop10();
}

/* INIT */
loadLevels();
loadPlayers();

</script>

</body>
</html>
