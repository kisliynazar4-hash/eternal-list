<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal List</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#111;
color:white;
}

header{
background:#1a1a1a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #d62d2d;
}

.logo{
color:#ff4040;
font-weight:800;
font-size:22px;
}

nav a{
margin:0 10px;
cursor:pointer;
color:white;
text-decoration:none;
}

nav a:hover{color:#ff4040}

section{padding:20px}

.card{
background:#1c1c1c;
padding:10px;
margin:8px 0;
border-left:5px solid #d62d2d;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#d62d2d;
border:none;
color:white;
padding:6px 10px;
cursor:pointer;
}

button:hover{background:#ff4040}

.hidden{display:none}

input{
padding:6px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
<div class="logo">Eternal List</div>

<nav>
<a onclick="show('levels')">Levels</a>
<a onclick="show('players')">Players</a>
<a onclick="signup()">Sign-up</a>
<a onclick="login()">Login</a>
</nav>
</header>

<!-- LEVELS -->
<section id="levelsPage">
<h2>📊 Levels</h2>

<input id="search" placeholder="Search levels..." oninput="renderLevels()">

<br>

<input id="levelInput" placeholder="Level name">
<button onclick="addLevel()">Add</button>

<div id="levelsList"></div>
</section>

<!-- PLAYERS -->
<section id="playersPage" class="hidden">
<h2>🏆 Players</h2>

<input id="playerInput" placeholder="Player name">
<button onclick="addPlayer()">Add</button>

<div id="playersList"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDqe1P5mNBswq0gnuLScHyRn1iD27T2y4c",
authDomain: "eternal-list-28bef.firebaseapp.com",
projectId: "eternal-list-28bef",
appId: "1:999099656760:web:367da0352ae8b9db8494cd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 👑 ADMIN */
const ADMIN_EMAIL = "admin@gmail.com";
window.isAdmin = false;

/* 💾 DATA */
let levels = [];
let players = [];

/* 🔐 SIGNUP */
window.signup = async function(){
const email = prompt("Email:");
const pass = prompt("Password:");
const name = prompt("Name:");

const user = await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",user.user.uid),{
name,
email,
points:0,
hardest:"",
created:Date.now()
});

alert("Account created");
};

/* 🔑 LOGIN */
window.login = async function(){
const email = prompt("Email:");
const pass = prompt("Password:");

const user = await signInWithEmailAndPassword(auth,email,pass);

if(email === ADMIN_EMAIL){
window.isAdmin = true;
alert("ADMIN LOGGED IN");
}else{
alert("USER LOGGED IN");
}
};

/* 📊 LOAD LEVELS */
async function loadLevels(){
levels = [];
const snap = await getDocs(collection(db,"levels"));

snap.forEach(d=>{
levels.push({id:d.id,...d.data()});
});

renderLevels();
}

/* 👤 LOAD PLAYERS */
async function loadPlayers(){
players = [];
const snap = await getDocs(collection(db,"users"));

snap.forEach(d=>{
players.push({id:d.id,...d.data()});
});

renderPlayers();
}

/* ➕ ADD LEVEL */
window.addLevel = async function(){
if(!window.isAdmin) return alert("NOT ADMIN");

let name = document.getElementById("levelInput").value;
if(!name) return;

await addDoc(collection(db,"levels"),{
name,
position:levels.length+1
});

loadLevels();
};

/* ➕ ADD PLAYER */
window.addPlayer = async function(){
if(!window.isAdmin) return alert("NOT ADMIN");

let name = document.getElementById("playerInput").value;
if(!name) return;

await addDoc(collection(db,"users"),{
name,
points:0
});

loadPlayers();
};

/* ❌ DELETE */
window.deleteLevel = async function(id){
if(!window.isAdmin) return;
await deleteDoc(doc(db,"levels",id));
loadLevels();
};

window.deletePlayer = async function(id){
if(!window.isAdmin) return;
await deleteDoc(doc(db,"users",id));
loadPlayers();
};

/* 🧠 RANK SYSTEM */
function calcRank(points){
if(points>9000) return "Legend";
if(points>5000) return "Pro";
if(points>1000) return "Skilled";
return "Beginner";
}

/* 🔍 SEARCH */
function filterLevels(){
let q = document.getElementById("search").value.toLowerCase();
return levels.filter(l=>l.name.toLowerCase().includes(q));
}

/* 🖥 RENDER LEVELS */
function renderLevels(){
const list = document.getElementById("levelsList");
list.innerHTML="";

filterLevels().forEach((l,i)=>{
list.innerHTML += `
<div class="card">
<div>#${i+1} ${l.name}</div>
${window.isAdmin ? `<button onclick="deleteLevel('${l.id}')">X</button>` : ""}
</div>`;
});
}

/* 🖥 RENDER PLAYERS */
function renderPlayers(){
const list = document.getElementById("playersList");
list.innerHTML="";

players
.sort((a,b)=>(b.points||0)-(a.points||0))
.forEach((p,i)=>{
list.innerHTML += `
<div class="card">
<div>#${i+1} ${p.name} (${calcRank(p.points||0)})</div>
${window.isAdmin ? `<button onclick="deletePlayer('${p.id}')">X</button>` : ""}
</div>`;
});
}

/* 🔄 MENU */
window.show = function(page){
document.getElementById("levelsPage").classList.add("hidden");
document.getElementById("playersPage").classList.add("hidden");

if(page==="levels") document.getElementById("levelsPage").classList.remove("hidden");
if(page==="players") document.getElementById("playersPage").classList.remove("hidden");
};

/* 🚀 INIT */
loadLevels();
loadPlayers();

</script>

</body>
</html>
