<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal List</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#111;
color:white;
}

header{
padding:20px;
background:#1a1a1a;
border-bottom:2px solid #d62d2d;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#ff4040;
font-weight:800;
font-size:24px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
cursor:pointer;
}

nav a:hover{color:#ff4040}

section{padding:20px}

.card{
background:#1c1c1c;
padding:12px;
margin:8px 0;
border-left:5px solid #d62d2d;
}

h2{color:#ff4040}

.hidden{display:none}

button{
background:#d62d2d;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
margin-top:10px;
}
button:hover{background:#ff4040}
</style>
</head>

<body>

<header>
<div class="logo">Eternal List</div>

<nav>
<a onclick="showPage('levels')">Levels</a>
<a onclick="showPage('players')">Players</a>
</nav>
</header>

<!-- LEVELS PAGE -->
<section id="levelsPage">
<h2>📊 Top Levels</h2>
<div id="levelsList"></div>

<button onclick="addLevel()">+ Add Level</button>
</section>

<!-- PLAYERS PAGE -->
<section id="playersPage" class="hidden">
<h2>🏆 Top Players</h2>
<div id="playersList"></div>

<button onclick="addPlayer()">+ Add Player</button>
</section>

<script>

//////////////////////
// ✏️ EDIT HERE
//////////////////////

let levels = [
"Thinking Space V",
"Megatrone",
"Miiopk009 Ship Trials (Buffed)",
"Silent Thinking Space 2",
"Silent Unleashed Kyouki",
"Ashley Wave Trials (Buffed, Balanced)",
"Sakupen End (Megabuffed, Possible, Balanced)",
"Death Corridor (Buffed, Possible)",
"Zoink game trials",
"Top 10"
];

let players = [
"Miiopk009",
"Zoink",
"Doggie",
"Vortrox",
"SikuLLL",
"Gamer999",
"Trick",
"Arshadow",
"GalaxySamok",
"Riot"
];

//////////////////////
// RENDER FUNCTIONS
//////////////////////

function renderLevels(){
const list = document.getElementById("levelsList");
list.innerHTML = "";
levels.forEach((l,i)=>{
list.innerHTML += `<div class="card">#${i+1} ${l}</div>`;
});
}

function renderPlayers(){
const list = document.getElementById("playersList");
list.innerHTML = "";
players.forEach((p,i)=>{
list.innerHTML += `<div class="card">#${i+1} ${p}</div>`;
});
}

//////////////////////
// MENU SWITCH
//////////////////////

function showPage(page){

document.getElementById("levelsPage").classList.add("hidden");
document.getElementById("playersPage").classList.add("hidden");

if(page==="levels") document.getElementById("levelsPage").classList.remove("hidden");
if(page==="players") document.getElementById("playersPage").classList.remove("hidden");

}

//////////////////////
// ADD FUNCTIONS
//////////////////////

function addLevel(){
let name = prompt("Enter level name:");
if(name) levels.push(name);
renderLevels();
}

function addPlayer(){
let name = prompt("Enter player name:");
if(name) players.push(name);
renderPlayers();
}

//////////////////////
// INIT
//////////////////////

renderLevels();
renderPlayers();

</script>

</body>
</html>
